# EFAK AI Application Configuration
spring:
  # Application Configuration
  application:
    name: efak-ai

  # Main Configuration
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

  # Web Configuration
  web:
    resources:
      static-locations: classpath:/statics/

  # AOP Configuration
  aop:
    proxy-target-class: true

  # Database Configuration (H2 file-based)
  datasource:
    url: ${EFAK_DB_URL}
    username: ${EFAK_DB_USERNAME}
    password: ${EFAK_DB_PASSWORD}
    driver-class-name: ${EFAK_DB_DRIVER}
    hikari:
      connection-test-query: SELECT 1
      validation-timeout: 3000
      connection-timeout: 10000

  # SQL init - create tables on startup
  sql:
    init:
      mode: always
      schema-locations: file:/opt/efak/config/sql/init-db.sql

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none

  # Jackson Configuration
  jackson:
    time-zone: ${EFAK_TIMEZONE}
    date-format: yyyy-MM-dd HH:mm:ss

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  # Redis Configuration
  data:
    redis:
      host: ${EFAK_REDIS_HOST}
      port: ${EFAK_REDIS_PORT}
      database: ${EFAK_REDIS_DATABASE}
      timeout: ${EFAK_REDIS_TIMEOUT}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

# Server Configuration
server:
  port: ${EFAK_SERVER_PORT}
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false
    path: /error
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Logging Configuration
logging:
  level:
    org.apache.ibatis: WARN
    org.springframework.jdbc.datasource.DataSourceTransactionManager: WARN
    com.zaxxer.hikari.pool.ProxyConnection: ERROR
    org.apache.kafka.common.config.AbstractConfig: ERROR
    org.apache.kafka: WARN
    org.apache.kafka.clients: WARN
    org.apache.kafka.common: WARN
    org.kafka.eagle.web.scheduler: DEBUG
    org.kafka.eagle.web.service: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{nodeId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{nodeId}] %logger{36} - %msg%n"

# EFAK Distributed Task Configuration
efak:
  distributed:
    task:
      offline-timeout: ${EFAK_TASK_OFFLINE_TIMEOUT}
      shard-result-wait-time: ${EFAK_TASK_SHARD_WAIT_TIME}
      shard-result-expire-minutes: ${EFAK_TASK_SHARD_EXPIRE_MINUTES}
  data-retention-days: ${EFAK_DATA_RETENTION_DAYS}
